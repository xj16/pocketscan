name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save runner minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Android flagship: assemble the debug APK and run the JVM unit tests.
  # ---------------------------------------------------------------------------
  android:
    name: Android build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission to gradlew
        run: chmod +x ./gradlew

      - name: Run unit tests (ReceiptParser, Quad, …)
        run: ./gradlew testDebugUnitTest --stacktrace

      - name: Assemble debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Lint
        run: ./gradlew lintDebug --stacktrace
        continue-on-error: true

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: pocketscan-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  # iOS parity target: generate the project with XcodeGen, build, and test.
  # ---------------------------------------------------------------------------
  ios:
    name: iOS build & test
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: |
          # Some runner images carry an untrusted third-party tap (e.g. aws/tap)
          # that makes `brew install` abort with a tap-trust error. Drop it if
          # present, then install XcodeGen from the core formulae.
          brew untap aws/tap 2>/dev/null || true
          brew install xcodegen

      - name: Generate Xcode project
        working-directory: ios
        run: xcodegen generate

      - name: Build & test (iPhone simulator)
        working-directory: ios
        run: |
          set -o pipefail
          xcodebuild \
            -project PocketScan.xcodeproj \
            -scheme PocketScan \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
            clean build test \
            CODE_SIGNING_ALLOWED=NO | xcpretty || \
          xcodebuild \
            -project PocketScan.xcodeproj \
            -scheme PocketScan \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
            clean build test \
            CODE_SIGNING_ALLOWED=NO
