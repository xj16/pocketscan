name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save runner minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Android flagship: assemble the debug APK and run the JVM unit tests.
  # ---------------------------------------------------------------------------
  android:
    name: Android build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission to gradlew
        run: chmod +x ./gradlew

      - name: Run unit tests + coverage (ReceiptParser, DAO, ViewModel, …)
        run: ./gradlew jacocoTestReport --stacktrace

      - name: Assemble debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Lint
        run: ./gradlew lintDebug --stacktrace
        continue-on-error: true

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: pocketscan-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: pocketscan-coverage
          path: app/build/reports/jacoco/jacocoTestReport
          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  # iOS parity target: generate the project with XcodeGen, build, and test.
  # ---------------------------------------------------------------------------
  ios:
    name: iOS build & test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select latest Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Install XcodeGen
        run: |
          # Some runner images carry an untrusted third-party tap (e.g. aws/tap)
          # that makes `brew install` abort with a tap-trust error. Drop it if
          # present, then install XcodeGen from the core formulae.
          brew untap aws/tap 2>/dev/null || true
          brew install xcodegen

      - name: Generate Xcode project
        working-directory: ios
        run: |
          xcodegen generate
          # Fail fast with a clear message if the project can't be parsed.
          xcodebuild -list -project PocketScan.xcodeproj

      - name: Pick an available iOS simulator
        id: sim
        run: |
          # Grab the UDID of the first available iPhone simulator using pure
          # shell (jq ships on the runner) so we never hard-code a device/OS
          # that might be absent.
          UDID=$(xcrun simctl list devices available --json \
            | jq -r '[.devices[][] | select(.name | test("iPhone"))][0].udid')
          echo "Using simulator UDID: $UDID"
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"

      - name: Build & test
        working-directory: ios
        run: |
          set -o pipefail
          xcodebuild \
            -project PocketScan.xcodeproj \
            -scheme PocketScan \
            -destination "platform=iOS Simulator,id=${{ steps.sim.outputs.udid }}" \
            clean build test \
            CODE_SIGNING_ALLOWED=NO

  # ---------------------------------------------------------------------------
  # Browser demo: the JS port of ReceiptParser must stay behaviorally identical
  # to the Kotlin/Swift parsers. These re-run the JVM/XCTest fixtures in Node.
  # ---------------------------------------------------------------------------
  demo:
    name: Parser playground (JS parity)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run JS parser parity tests
        working-directory: demo
        run: npm test
